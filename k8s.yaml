apiVersion: v1
kind: Namespace
metadata:
  name: memo-mind
---
# --- Mongo ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-data
  namespace: memo-mind
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: memo-mind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongo-data
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: memo-mind
spec:
  selector:
    app: mongo
  ports:
    - port: 27017
      targetPort: 27017
---
# --- Chroma ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: chroma-data
  namespace: memo-mind
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chroma
  namespace: memo-mind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chroma
  template:
    metadata:
      labels:
        app: chroma
    spec:
      containers:
        - name: chroma
          image: chromadb/chroma
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: chroma-data
---
apiVersion: v1
kind: Service
metadata:
  name: chroma
  namespace: memo-mind
spec:
  selector:
    app: chroma
  ports:
    - port: 8000
      targetPort: 8000
---
# --- Backend (Deno) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: memo-mind
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: memo-mind/backend:v1
          ports:
            - containerPort: 9999
          envFrom:
            - secretRef:
                name: backend-env
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: memo-mind
spec:
  selector:
    app: backend
  ports:
    - port: 9999
      targetPort: 9999
---
# --- Frontend (nginx) ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: memo-mind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: memo-mind/frontend:v1
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: memo-mind
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80