version: "3.9"

services:
  app:
    build: .
    container_name: memo_mind_backend
    ports:
      - "9999:9999"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - chroma
      - mongo
    env_file:
      - .env.stage
    command: deno task dev

  chroma:
    image: chromadb/chroma
    container_name: chroma_db
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  mongo:
    image: mongo
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  chroma_data:
  mongo_data: